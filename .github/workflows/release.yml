name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: GraphAlg
            asset_name: GraphAlg-linux-x86_64.zip
          - os: windows-latest
            artifact_name: GraphAlg.exe
            asset_name: GraphAlg-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake g++ \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libudev-dev libgl1-mesa-dev \
            libfreetype-dev \
            libopenal-dev libvorbis-dev libflac-dev \
            libxinerama-dev libxfixes-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p package/assets
          cp build/${{ matrix.artifact_name }} package/
          cp build/assets/NotoSans.ttf package/assets/
          cd package && zip -r ../${{ matrix.asset_name }} .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir package\assets
          copy build\Release\${{ matrix.artifact_name }} package\
          copy build\assets\NotoSans.ttf package\assets\
          cd package && tar -acf ..\${{ matrix.asset_name }} *
        shell: cmd

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
